<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --surface-hover: #243044;
      --border: #2d3a4f;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #14a800;
      --accent-dim: #0d7a00;
      --danger: #ff6b6b;
      --warn: #ffb347;
      --info: #5b9cf5;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 13px;
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .app-header {
      background: linear-gradient(135deg, #1a2332 0%, #0f1419 100%);
      border-bottom: 1px solid var(--border);
      padding: 16px 14px;
    }

    .app-header h1 {
      margin: 0;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .app-header h1 span.logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      background: var(--accent);
      color: #fff;
      border-radius: 8px;
      font-size: 14px;
    }

    .app-header p {
      margin: 6px 0 0;
      font-size: 11px;
      color: var(--muted);
      line-height: 1.4;
    }

    #job-list {
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .empty-state {
      text-align: center;
      padding: 32px 16px;
      color: var(--muted);
    }

    .empty-state .icon { font-size: 32px; margin-bottom: 8px; opacity: 0.6; }

    .job-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      box-shadow: var(--shadow);
      transition: border-color 0.2s;
    }

    .job-card:hover { border-color: #3d4f6a; }

    .job-card.refreshing { border-color: var(--warn); }
    .job-card.alert-ready { border-left: 3px solid var(--accent); }
    .job-card.needs-verification { border-left: 3px solid var(--warn); }
    .job-card.awaiting-view { border-left: 3px solid var(--info); }

    .job-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 10px;
    }

    .job-title {
      font-weight: 600;
      font-size: 14px;
      line-height: 1.35;
      word-break: break-word;
      flex: 1;
    }

    .status-pill {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 3px 8px;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .status-pill.live { background: rgba(20, 168, 0, 0.2); color: #5ddb4a; }
    .status-pill.refresh { background: rgba(255, 179, 71, 0.2); color: var(--warn); }
    .status-pill.wait { background: rgba(91, 156, 245, 0.2); color: var(--info); }
    .status-pill.error { background: rgba(255, 107, 107, 0.2); color: var(--danger); }

    .stats-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }

    .stat-chip {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 5px 10px;
      font-size: 11px;
      color: var(--muted);
    }

    .stat-chip b { color: var(--text); font-weight: 600; }

    .last-viewed-block {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 10px;
    }

    .last-viewed-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .last-viewed-value {
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1.2;
    }

    .last-viewed-value.muted { color: var(--muted); font-size: 14px; font-weight: 500; }
    .last-viewed-value.refreshing { color: var(--warn); font-size: 14px; }

    .last-viewed-meta {
      font-size: 10px;
      color: var(--muted);
      margin-top: 6px;
    }

    .banner {
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 11px;
      line-height: 1.45;
      margin-bottom: 10px;
    }

    .banner.warn {
      background: rgba(255, 179, 71, 0.12);
      border: 1px solid rgba(255, 179, 71, 0.35);
      color: #ffd699;
    }

    .change-row {
      background: rgba(20, 168, 0, 0.08);
      border: 1px solid rgba(20, 168, 0, 0.25);
      border-radius: 8px;
      padding: 10px;
      font-size: 11px;
      margin-bottom: 10px;
    }

    .change-row .label {
      font-size: 10px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .change-arrow { color: var(--muted); margin: 0 4px; }
    .change-from { color: var(--muted); text-decoration: line-through; }
    .change-to { color: #5ddb4a; font-weight: 700; }
    .change-notified { color: var(--accent); font-weight: 600; margin-left: 6px; }

    .check-row {
      font-size: 11px;
      color: var(--muted);
      padding: 8px 0 0;
      border-top: 1px solid var(--border);
    }

    .card-footer {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }

    .card-footer label {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
    }

    .card-footer input {
      width: 52px;
      padding: 6px 8px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      color: var(--text);
      font-size: 12px;
    }

    .btn-remove {
      margin-left: auto;
      background: transparent;
      border: 1px solid var(--danger);
      color: var(--danger);
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 11px;
      cursor: pointer;
      font-weight: 600;
    }

    .btn-remove:hover { background: rgba(255, 107, 107, 0.15); }

    .app-footer {
      padding: 0 14px 14px;
    }

    #add-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(180deg, #18c210 0%, var(--accent-dim) 100%);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(20, 168, 0, 0.35);
    }

    #add-btn:hover { filter: brightness(1.08); }
    #add-btn:active { transform: scale(0.98); }

    #status {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 12px;
      line-height: 1.4;
      display: none;
    }

    #status.visible { display: block; }

    .status-error {
      background: rgba(255, 107, 107, 0.12);
      border: 1px solid rgba(255, 107, 107, 0.35);
      color: #ffb3b3;
    }

    .status-success {
      background: rgba(20, 168, 0, 0.12);
      border: 1px solid rgba(20, 168, 0, 0.35);
      color: #8fef7a;
    }

    .status-info {
      background: rgba(91, 156, 245, 0.12);
      border: 1px solid rgba(91, 156, 245, 0.35);
      color: #a8c9ff;
    }

    #debug-toggle {
      display: block;
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      cursor: pointer;
      margin-top: 10px;
      padding: 6px;
    }

    #debug-toggle:hover { color: var(--text); }

    #debug-section {
      margin-top: 8px;
      padding: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 10px;
      font-family: ui-monospace, monospace;
      max-height: 120px;
      overflow-y: auto;
      display: none;
      color: var(--muted);
    }

    #debug-section.show { display: block; }
  </style>
</head>
<body>
  <header class="app-header">
    <h1><span class="logo">U</span> Upwork Job Tracker</h1>
    <p>Alerts when the client views more recently — compared in seconds, shown in Upwork’s exact units.</p>
  </header>

  <div id="job-list"></div>

  <footer class="app-footer">
    <button id="add-btn" type="button">+ Track Current Job Tab</button>
    <div id="status"></div>
    <div id="debug-toggle">Show debug log</div>
    <div id="debug-section"></div>
  </footer>

  <script src="extractor-shared.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
