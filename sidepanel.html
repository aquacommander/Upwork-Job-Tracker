<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      padding: 12px;
      margin: 0;
    }
    h2 { font-size: 18px; margin: 0 0 12px 0; }
    .job-item {
      background: #f7f7f7;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 6px;
      border: 1px solid #e0e0e0;
    }
    .job-item.needs-verification {
      border-color: #e67e22;
      background: #fff8f0;
    }
    .warning-banner {
      margin: 6px 0;
      padding: 6px 8px;
      background: #fdebd0;
      border: 1px solid #e67e22;
      border-radius: 4px;
      font-size: 11px;
      color: #a04000;
      line-height: 1.4;
    }
    .job-title { font-weight: bold; margin-bottom: 4px; word-break: break-word; }
    .details { font-size: 12px; color: #555; line-height: 1.5; }
    .compare-log, .compare-history {
      margin-top: 6px;
      padding: 6px 8px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 11px;
      color: #333;
      line-height: 1.5;
    }
    .compare-history { margin-top: 4px; background: #fafafa; }
    .compare-history .history-row {
      margin-top: 4px;
      padding-top: 4px;
      border-top: 1px dashed #e0e0e0;
    }
    .compare-history .history-row:first-of-type { border-top: none; padding-top: 0; }
    .compare-arrow { color: #888; }
    .compare-new { color: #c0392b; font-weight: 600; }
    .compare-skipped { color: #e67e22; text-decoration: line-through; }
    .compare-note { color: #888; font-weight: normal; }
    .compare-notify { color: #27ae60; font-weight: 600; }
    .compare-error { border-color: #e74c3c; background: #fde8e8; }
    .interval-row {
      margin-top: 8px; display: flex; align-items: center; gap: 6px;
    }
    .interval-row input { width: 60px; padding: 4px; }
    .remove-btn {
      margin-left: auto;
      background: #e74c3c; color: white; border: none;
      padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px;
    }
    .remove-btn:hover { background: #c0392b; }
    #add-btn {
      display: block; width: 100%; margin: 12px 0; padding: 10px;
      background: #2ecc71; color: white; border: none; border-radius: 6px;
      font-size: 16px; cursor: pointer; font-weight: 600;
    }
    #add-btn:hover { background: #27ae60; }
    #status {
      font-size: 12px; margin-top: 6px; padding: 6px; border-radius: 4px;
    }
    .status-error { color: #e74c3c; background: #fde8e8; }
    .status-success { color: #27ae60; background: #e8f8ef; }
    .status-info { color: #555; background: #f0f0f0; }
    #debug-section {
      margin-top: 10px; padding: 8px; background: #fff3cd; border-radius: 4px;
      font-size: 11px; max-height: 150px; overflow-y: auto; display: none;
    }
    #debug-section.show { display: block; }
    #debug-toggle { font-size: 11px; color: #888; cursor: pointer; margin-top: 8px; }
  </style>
</head>
<body>
  <h2>🔍 Upwork Job Tracker</h2>
  <div id="job-list"></div>
  <button id="add-btn">+ Add Current Tab</button>
  <div id="status"></div>
  <div id="debug-section"></div>
  <div id="debug-toggle">Show Debug Info</div>
  <script src="extractor-shared.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
